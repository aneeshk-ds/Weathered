name: Android Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile to run
        required: true
        default: preview-apk
        type: choice
        options:
          - preview-apk
          - production

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  android:
    name: Android ${{ inputs.profile }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Project release checks
        run: npm run verify:project

      - name: Typecheck
        run: npm run typecheck

      - name: Core smoke tests
        run: npm run test:core

      - name: Data stress tests
        run: npm run test:data

      - name: Verify Expo token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing EXPO_TOKEN. Add it as a repository secret before running Android builds."
            exit 1
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS Android build
        id: eas
        working-directory: apps/mobile
        run: |
          npx eas-cli@latest build --platform android --profile "${{ inputs.profile }}" --non-interactive --json > "$RUNNER_TEMP/eas-build.json"
          node -e "const b=require(process.env.RUNNER_TEMP+'/eas-build.json');const a=Array.isArray(b)?b[0]:b;const u=(a.artifacts&&(a.artifacts.applicationArchiveUrl||a.artifacts.buildUrl))||'';require('fs').appendFileSync(process.env.GITHUB_OUTPUT,'artifact_url='+u+'\n')"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Publish latest APK to GitHub Releases
        if: ${{ inputs.profile == 'preview-apk' && steps.eas.outputs.artifact_url != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fL -o weathered-latest.apk "${{ steps.eas.outputs.artifact_url }}"
          gh release delete latest-apk --cleanup-tag --yes || true
          gh release create latest-apk weathered-latest.apk \
            --title "Weathered latest Android APK" \
            --notes "Automated preview APK built from ${{ github.sha }}." \
            --latest

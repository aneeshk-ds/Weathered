<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weathered — interactive preview</title>
<style>
  :root{
    --bg:#0b1310; --panel:#0f1814; --card:#16241d; --card2:#1b2c24;
    --line:#27392f; --text:#eef3ee; --muted:#9fb3a8; --dim:#6b7d74;
    --accent:#5dcaa5; --accent-d:#04342c; --warn:#f0b357; --danger:#e07a6b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:#05090a; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:var(--text);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
  .stage{display:flex; flex-direction:column; align-items:center; gap:14px;}
  .hint{color:#7d8f86; font-size:13px; max-width:360px; text-align:center; line-height:1.5;}
  .phone{width:360px; height:740px; background:var(--bg); border-radius:34px; border:1px solid #233; overflow:hidden;
    display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,.5); position:relative;}
  .statusbar{height:34px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; font-size:12px; color:var(--muted); flex:none;}
  .screen{flex:1; overflow-y:auto; padding:6px 18px 18px;}
  .screen::-webkit-scrollbar{width:0;}
  .eyebrow{font-size:11px; letter-spacing:1px; color:var(--accent); text-transform:uppercase; margin:8px 0 2px;}
  h1{font-size:21px; font-weight:600; margin:0 0 3px;}
  .sub{font-size:13px; color:var(--muted); margin:0 0 16px; line-height:1.5;}
  .card{background:var(--card); border-radius:14px; padding:14px; margin-bottom:14px;}
  .wbar{display:flex; align-items:center; gap:12px;}
  .wicon{width:42px; height:42px; border-radius:12px; background:var(--card2); display:flex; align-items:center; justify-content:center; font-size:22px;}
  .wmain{font-size:15px; font-weight:600;}
  .wsub{font-size:12px; color:var(--muted);}
  .label{font-size:13px; color:var(--muted); margin:2px 0 8px;}
  .slider{width:100%; -webkit-appearance:none; height:5px; border-radius:3px; background:#2a3b32; outline:none;}
  .slider::-webkit-slider-thumb{-webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--accent); cursor:pointer;}
  .slider::-moz-range-thumb{width:20px; height:20px; border:none; border-radius:50%; background:var(--accent); cursor:pointer;}
  .moodrow{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
  .moodval{font-size:16px; font-weight:600; min-width:26px; text-align:right;}
  .chips{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
  .chip{flex:1; min-width:64px; text-align:center; font-size:13px; color:var(--muted); background:var(--card2);
    border-radius:10px; padding:9px 6px; cursor:pointer; transition:.12s; border:1px solid transparent;}
  .chip.on{background:var(--accent); color:var(--accent-d); font-weight:600;}
  .pill{font-size:13px; color:var(--muted); background:var(--card2); border-radius:18px; padding:7px 15px; cursor:pointer; transition:.12s; border:1px solid transparent;}
  .pill.on{background:var(--accent); color:var(--accent-d); font-weight:600;}
  .note{width:100%; background:var(--card2); border:none; border-radius:10px; color:var(--text); font-size:13px; padding:10px; resize:none; font-family:inherit;}
  .btn{background:var(--accent); color:var(--accent-d); border:none; border-radius:12px; padding:13px; width:100%; font-size:15px; font-weight:600; cursor:pointer; transition:.12s;}
  .btn:active{transform:scale(.98);}
  .btn.ghost{background:var(--card2); color:var(--muted);}
  .metrics{display:flex; gap:9px; margin-bottom:14px;}
  .metric{flex:1; background:var(--card2); border-radius:11px; padding:13px 8px; text-align:center;}
  .metric .mlabel{font-size:11px; color:var(--muted); margin-bottom:4px;}
  .metric .mval{font-size:22px; font-weight:600;}
  .insight{background:var(--card); border-left:3px solid var(--accent); border-radius:0 10px 10px 0; padding:13px; margin-bottom:14px;}
  .insight .it{font-size:12px; color:var(--accent); margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px;}
  .insight .im{font-size:14px; line-height:1.5;}
  .bars{display:flex; align-items:flex-end; gap:6px; height:80px; margin:10px 0 4px;}
  .bar{flex:1; background:#2a3b32; border-radius:3px; transition:.3s;}
  .bar.hi{background:var(--accent);}
  .barlabels{display:flex; gap:6px; font-size:10px; color:var(--dim);}
  .barlabels span{flex:1; text-align:center;}
  .rings{display:flex; gap:10px; margin-bottom:14px;}
  .ring{flex:1; background:var(--card); border-radius:14px; padding:14px 8px; text-align:center;}
  .ring svg{display:block; margin:0 auto;}
  .ring .rv{font-size:18px; font-weight:600; fill:var(--text);}
  .ring .ru{font-size:9px; fill:var(--muted);}
  .ring .rlabel{font-size:11px; color:var(--muted); margin-top:8px;}
  .legend{display:flex; flex-direction:column; gap:5px; margin-top:10px; align-items:flex-start;}
  .legend .li{display:flex; align-items:center; gap:7px; font-size:11px; color:var(--muted);}
  .legend .dot{width:9px; height:9px; border-radius:50%;}
  .entry{background:var(--card); border-radius:12px; padding:12px; margin-bottom:10px;}
  .entry .top{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .entry .when{font-size:12px; color:var(--dim);}
  .entry .tags{font-size:13px; color:var(--text);}
  .entry .meta{font-size:12px; color:var(--muted); margin-top:4px;}
  .entry .acts{display:flex; gap:8px; margin-top:10px;}
  .entry .acts button{flex:1; background:var(--card2); border:none; color:var(--muted); font-size:12px; padding:7px; border-radius:8px; cursor:pointer;}
  .entry .acts button.del{color:var(--danger);}
  .empty{text-align:center; color:var(--dim); font-size:13px; padding:30px 10px;}
  .nudge{background:var(--card); border-radius:12px; padding:13px; margin-bottom:10px;}
  .nudge .nt{font-size:14px; font-weight:600; margin-bottom:4px;}
  .nudge .nm{font-size:13px; color:var(--muted); line-height:1.5;}
  .nudge .na{font-size:12px; color:var(--accent); margin-top:8px;}
  .tabbar{flex:none; display:flex; border-top:1px solid var(--line); background:var(--panel); padding:8px 0 12px;}
  .tab{flex:1; text-align:center; cursor:pointer; color:var(--dim);}
  .tab .ti{font-size:21px; line-height:1;}
  .tab .tl{font-size:11px; margin-top:3px;}
  .tab.on{color:var(--accent);}
  .toast{position:absolute; left:50%; bottom:86px; transform:translateX(-50%) translateY(20px); background:var(--accent); color:var(--accent-d);
    font-size:13px; font-weight:600; padding:10px 18px; border-radius:20px; opacity:0; transition:.3s; pointer-events:none;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .seg{display:flex; gap:6px; margin-bottom:14px;}
  .seg .pill{flex:1; text-align:center;}
  .readline{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--accent); margin-bottom:14px;}
</style>
</head>
<body>
<div class="stage">
  <div class="phone">
    <div class="statusbar"><span id="clock">9:41</span><span>Weathered</span><span>100%</span></div>
    <div class="screen" id="screen"></div>
    <div class="tabbar" id="tabbar"></div>
    <div class="toast" id="toast"></div>
  </div>
  <div class="hint">Interactive preview of the simplified 3-tab design. Move the mood slider, pick options, save a check-in, then open Insights and History. Everything is clickable.</div>
</div>

<script>
const state = {
  tab: "home",
  mood: 7,
  energy: "medium",
  category: "social",
  outcome: "go_out",
  note: "",
  weather: { icon:"⛅", cond:"Cloudy", temp:22, hum:66, loc:"Bengaluru" },
  entries: [
    {id:1, mood:4, energy:"low", category:"social", outcome:"cancel", cond:"rainy", note:"too wet to head out", ago:"Yesterday"},
    {id:2, mood:8, energy:"high", category:"work", outcome:"work", cond:"sunny", note:"", ago:"2 days ago"},
    {id:3, mood:5, energy:"medium", category:"spending", outcome:"avoid", cond:"cloudy", note:"", ago:"3 days ago"},
  ],
};

const OUTCOMES = {
  social:[["go_out","Go out"],["cancel","Cancel"]],
  work:[["work","Do it"],["skip","Skip"]],
  spending:[["buy","Buy"],["avoid","Hold off"]],
  other:[["do","Do it"],["dont","Don't"]],
};
const CAT_LABEL = {social:"Going out", work:"Work", spending:"Spending", other:"Other"};

function readline(){
  const m = state.mood;
  if(m>=7) return "Steady mood — good day to decide.";
  if(m>=5) return "Mixed signals — keep choices light.";
  return "Low energy read — go easy on big calls.";
}

function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600); }

function renderHome(){
  const w=state.weather;
  const outBtns = OUTCOMES[state.category].map(([v,l])=>
    `<div class="pill ${state.outcome===v?'on':''}" data-out="${v}">${l}</div>`).join("");
  return `
    <div class="eyebrow">Home</div>
    <h1>How are you right now?</h1>
    <p class="sub">One quick check-in. Takes about 20 seconds.</p>
    <div class="card wbar">
      <div class="wicon">${w.icon}</div>
      <div><div class="wmain">${w.cond}, ${w.temp}°</div><div class="wsub">${w.loc} · humidity ${w.hum}%</div></div>
    </div>
    <div class="readline">◆ ${readline()}</div>
    <div class="label">Mood</div>
    <div class="moodrow">
      <input type="range" min="1" max="10" value="${state.mood}" class="slider" id="mood">
      <div class="moodval" id="moodval">${state.mood}</div>
    </div>
    <div class="label">Energy</div>
    <div class="chips">
      ${["low","medium","high"].map(e=>`<div class="chip ${state.energy===e?'on':''}" data-energy="${e}">${e[0].toUpperCase()+e.slice(1)}</div>`).join("")}
    </div>
    <div class="label">What are you deciding?</div>
    <div class="chips">
      ${Object.keys(CAT_LABEL).map(c=>`<div class="chip ${state.category===c?'on':''}" data-cat="${c}">${CAT_LABEL[c]}</div>`).join("")}
    </div>
    <div class="label">Your choice</div>
    <div class="seg">${outBtns}</div>
    <div class="label">Note (optional)</div>
    <textarea class="note" id="note" rows="2" maxlength="120" placeholder="Anything worth remembering…">${state.note}</textarea>
    <div style="height:14px"></div>
    <button class="btn" id="save">Save check-in</button>
    <div style="height:8px"></div>
  `;
}

function progressRing(frac, valText, unitText){
  const r=34, c=2*Math.PI*r, off=c*(1-Math.max(0,Math.min(1,frac)));
  return `<svg width="92" height="92" viewBox="0 0 92 92">
    <circle cx="46" cy="46" r="${r}" fill="none" stroke="#2a3b32" stroke-width="8"/>
    <circle cx="46" cy="46" r="${r}" fill="none" stroke="#5dcaa5" stroke-width="8" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 46 46)"/>
    <text x="46" y="46" text-anchor="middle" class="rv">${valText}</text>
    <text x="46" y="59" text-anchor="middle" class="ru">${unitText}</text>
  </svg>`;
}
function donutRing(segments){
  const r=34, c=2*Math.PI*r; let acc=0;
  const arcs=segments.filter(s=>s.val>0).map(s=>{
    const len=c*s.val, gap=c-len, off=-acc;
    acc+=len;
    return `<circle cx="46" cy="46" r="${r}" fill="none" stroke="${s.color}" stroke-width="8"
      stroke-dasharray="${len.toFixed(1)} ${gap.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 46 46)"/>`;
  }).join("");
  const total=segments.reduce((a,s)=>a+s.count,0);
  return `<svg width="92" height="92" viewBox="0 0 92 92">
    <circle cx="46" cy="46" r="${r}" fill="none" stroke="#2a3b32" stroke-width="8"/>
    ${arcs}
    <text x="46" y="46" text-anchor="middle" class="rv">${total}</text>
    <text x="46" y="59" text-anchor="middle" class="ru">logs</text>
  </svg>`;
}

function renderInsights(){
  const e=state.entries;
  const avg = e.length? (e.reduce((s,x)=>s+x.mood,0)/e.length):0;
  const avgText = e.length? avg.toFixed(1):"–";
  const rainyCancels = e.filter(x=>x.category==="social"&&x.outcome==="cancel"&&x.cond==="rainy").length;
  const followed = e.filter(x=>["go_out","work","buy","do"].includes(x.outcome)).length;
  const followFrac = e.length? followed/e.length:0;
  const week=[4,6,5,8,5,7,state.mood];
  const max=Math.max(...week);
  const bars=week.map(v=>`<div class="bar ${v===max?'hi':''}" style="height:${Math.round(v/10*100)}%"></div>`).join("");
  const catColors={social:"#5dcaa5", work:"#7fb3e0", spending:"#f0b357", other:"#c98bd6"};
  const total=e.length||1;
  const segs=Object.keys(CAT_LABEL).map(k=>{
    const count=e.filter(x=>x.category===k).length;
    return {key:k, count, val:count/total, color:catColors[k]};
  });
  const legend=segs.filter(s=>s.count>0).map(s=>
    `<div class="li"><span class="dot" style="background:${s.color}"></span>${CAT_LABEL[s.key]} · ${s.count}</div>`).join("");
  const insightMsg = rainyCancels>=1
    ? "You cancel social plans more often on rainy, low-energy days."
    : "Keep logging — a few more check-ins will reveal your patterns.";
  return `
    <div class="eyebrow">Insights</div>
    <h1>Your patterns</h1>
    <p class="sub">What the last week is telling you.</p>
    <div class="readline">◆ ${readline()}</div>
    <div class="insight"><div class="it">Pattern</div><div class="im">${insightMsg}</div></div>
    <div class="rings">
      <div class="ring">${progressRing(avg/10, avgText, "/ 10")}<div class="rlabel">Avg mood</div></div>
      <div class="ring">${progressRing(followFrac, Math.round(followFrac*100)+"%", "acted")}<div class="rlabel">Followed through</div></div>
    </div>
    <div class="card">
      <div class="label" style="margin-bottom:6px">Decisions by type</div>
      <div style="display:flex; align-items:center; gap:16px;">
        ${donutRing(segs)}
        <div class="legend">${legend||'<div class="li">No logs yet</div>'}</div>
      </div>
    </div>
    <div class="card">
      <div class="label" style="margin-bottom:0">Mood this week</div>
      <div class="bars">${bars}</div>
      <div class="barlabels"><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span></div>
    </div>
    <div class="label">Suggestions for right now</div>
    <div class="nudge"><div class="nt">Choose the lighter version</div><div class="nm">The useful decision may be the one that preserves your energy, not the one that proves discipline.</div><div class="na">→ Reduce the scope before deciding</div></div>
    <div class="nudge"><div class="nt">Follow through while it's easy</div><div class="nm">This looks like a decent window for connection, especially if the plan stays simple.</div><div class="na">→ Confirm the plan or send the message</div></div>
  `;
}

function renderHistory(){
  if(!state.entries.length) return `<div class="eyebrow">History</div><h1>Your check-ins</h1><div class="empty">No check-ins yet.<br>Log one from the Home tab.</div>`;
  const rows=state.entries.map(x=>{
    const outLabel=(OUTCOMES[x.category].find(o=>o[0]===x.outcome)||["",x.outcome])[1];
    if(state.editing==x.id){
      const energy=["low","medium","high"].map(en=>`<span class="chip ${x.energy===en?'on':''}" data-eenergy="${en}" style="flex:1;text-align:center">${en[0].toUpperCase()+en.slice(1)}</span>`).join("");
      return `<div class="entry" data-id="${x.id}" style="border:1px solid var(--accent)">
        <div class="label">Mood</div>
        <div class="moodrow"><input type="range" min="1" max="10" value="${x.mood}" class="slider" data-emood="${x.id}"><div class="moodval" id="emoodval">${x.mood}</div></div>
        <div class="label">Energy</div>
        <div class="chips">${energy}</div>
        <button class="btn" id="saveedit">Save changes</button>
        <div style="height:8px"></div>
        <button class="btn ghost" id="canceledit">Cancel</button>
      </div>`;
    }
    return `<div class="entry" data-id="${x.id}">
      <div class="top"><div class="tags">${CAT_LABEL[x.category]} · ${outLabel}</div><div class="when">${x.ago}</div></div>
      <div class="meta">Mood ${x.mood}/10 · ${x.energy} energy · ${x.cond}${x.note?` · "${x.note}"`:""}</div>
      <div class="acts"><button data-edit="${x.id}">Edit</button><button class="del" data-del="${x.id}">Delete</button></div>
    </div>`;
  }).join("");
  return `<div class="eyebrow">History</div><h1>Your check-ins</h1><p class="sub">Review what changed and the conditions behind it.</p>${rows}
    <button class="btn ghost" id="clear">Clear all entries</button>`;
}

function renderSettings(){
  return `
    <div class="eyebrow">Settings</div>
    <h1>Backup & data</h1>
    <p class="sub">Weathered keeps everything on this device. Back up to your cloud to move it to another.</p>
    <div class="card">
      <div class="nt">Back up to your cloud</div>
      <div class="nm">Saves a backup file you can drop into iCloud Drive or Google Drive from the share sheet.</div>
      <div style="height:12px"></div>
      <button class="btn" id="backup">Back up now</button>
    </div>
    <div class="card">
      <div class="nt">Restore from a backup</div>
      <div class="nm">Pick a Weathered backup file from your cloud or files to load it onto this device.</div>
      <div style="height:12px"></div>
      <button class="btn ghost" id="restore">Restore from a file</button>
    </div>
    <div class="card">
      <div class="nt">Your data</div>
      <div class="nm">${state.entries.length} check-in${state.entries.length===1?"":"s"} stored on this device.</div>
      <div style="height:12px"></div>
      <button class="btn ghost" id="cleardata">Clear all data</button>
    </div>
    <div class="card">
      <div class="nt">About</div>
      <div class="nm">Weathered 2.0.1</div>
      <div class="nm">Local-first: no accounts, no cloud sync. Live weather uses your device location via Open-Meteo.</div>
    </div>
  `;
}

const TABS=[["home","Home","🏠"],["history","History","🗂"],["insights","Insights","📊"],["settings","Settings","⚙️"]];

function render(){
  const s=document.getElementById("screen");
  s.innerHTML = state.tab==="home"?renderHome():state.tab==="insights"?renderInsights():state.tab==="settings"?renderSettings():renderHistory();
  s.scrollTop=0;
  document.getElementById("tabbar").innerHTML = TABS.map(([id,l,ic])=>
    `<div class="tab ${state.tab===id?'on':''}" data-tab="${id}"><div class="ti">${ic}</div><div class="tl">${l}</div></div>`).join("");
  bind();
}

function bind(){
  document.querySelectorAll("[data-tab]").forEach(t=>t.onclick=()=>{state.tab=t.dataset.tab; render();});
  if(state.tab==="home"){
    const mood=document.getElementById("mood");
    mood.oninput=e=>{state.mood=+e.target.value; document.getElementById("moodval").textContent=state.mood; document.querySelector(".readline").innerHTML="◆ "+readline();};
    document.querySelectorAll("[data-energy]").forEach(c=>c.onclick=()=>{state.energy=c.dataset.energy; render();});
    document.querySelectorAll("[data-cat]").forEach(c=>c.onclick=()=>{state.category=c.dataset.cat; state.outcome=OUTCOMES[state.category][0][0]; render();});
    document.querySelectorAll("[data-out]").forEach(c=>c.onclick=()=>{state.outcome=c.dataset.out; render();});
    document.getElementById("note").oninput=e=>state.note=e.target.value;
    document.getElementById("save").onclick=()=>{
      state.entries.unshift({id:Date.now(), mood:state.mood, energy:state.energy, category:state.category,
        outcome:state.outcome, cond:state.weather.cond.toLowerCase(), note:state.note, ago:"Just now"});
      state.note=""; toast("Check-in saved ✓"); render();
    };
  }
  if(state.tab==="history"){
    document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{state.editing=b.dataset.edit; render();});
    document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{state.entries=state.entries.filter(x=>x.id!=b.dataset.del); render();});
    document.querySelectorAll("[data-emood]").forEach(s=>s.oninput=e=>{const en=state.entries.find(x=>x.id==state.editing); if(en){en.mood=+e.target.value; document.getElementById("emoodval").textContent=en.mood;}});
    document.querySelectorAll("[data-eenergy]").forEach(c=>c.onclick=()=>{const en=state.entries.find(x=>x.id==state.editing); if(en){en.energy=c.dataset.eenergy; render();}});
    const se=document.getElementById("saveedit"); if(se) se.onclick=()=>{state.editing=null; toast("Changes saved ✓"); render();};
    const ce=document.getElementById("canceledit"); if(ce) ce.onclick=()=>{state.editing=null; render();};
    const c=document.getElementById("clear"); if(c) c.onclick=()=>{state.entries=[]; render();};
  }
  if(state.tab==="settings"){
    const b=document.getElementById("backup"); if(b) b.onclick=()=>toast("Share sheet → save to iCloud / Drive");
    const r=document.getElementById("restore"); if(r) r.onclick=()=>toast("Pick a backup file to restore");
    const cd=document.getElementById("cleardata"); if(cd) cd.onclick=()=>{state.entries=[]; toast("All data cleared"); render();};
  }
}

setInterval(()=>{const d=new Date(); document.getElementById("clock").textContent=d.toTimeString().slice(0,5);},1000);
render();
</script>
</body>
</html>
